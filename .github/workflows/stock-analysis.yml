name: AI 股票分析

on:
  schedule:
    # 北京时间 9:00 = UTC 1:00（周一到周五）
    - cron: "0 1 * * 1-5"
    # 北京时间 9:30 = UTC 1:30（周一到周五）
    - cron: "30 1 * * 1-5"
  workflow_dispatch:
    inputs:
      mode:
        description: "分析模式"
        required: true
        default: "morning"
        type: choice
        options:
          - morning
          - opening

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 判定分析模式
        id: mode
        run: |
          if [[ "${{ github.event.inputs.mode }}" != "" ]]; then
            echo "mode=${{ github.event.inputs.mode }}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.event.schedule }}" == "30 1 * * 1-5" ]]; then
            echo "mode=opening" >> $GITHUB_OUTPUT
          else
            echo "mode=morning" >> $GITHUB_OUTPUT
          fi

      - name: 运行 AI 股票分析
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
        run: |
          python scripts/main.py --mode ${{ steps.mode.outputs.mode }}
